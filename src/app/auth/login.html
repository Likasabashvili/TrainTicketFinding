<div class="auth-container">
  <div class="auth-card">
    <p class="auth-eyebrow">კეთილი დაბრუნება</p>
    <h2>შესვლა</h2>

    <div *ngIf="errorMessage" class="error" role="alert" aria-live="polite">
      {{ errorMessage }}
    </div>

    <label>
      <span>ტელეფონი</span>
      <input type="text" placeholder="+995 5XX XXX XXX" [(ngModel)]="phoneNumber" />
    </label>

    <label>
      <span>პაროლი</span>
      <input type="password" placeholder="შეიყვანე პაროლი" [(ngModel)]="password" />
    </label>

    <button type="button" (click)="login()" [disabled]="isLoading">
      {{ isLoading ? 'იტვირთება...' : 'შესვლა' }}
    </button>

    <p class="auth-link">არ გაქვს ანგარიში? <a routerLink="/register">რეგისტრაცია</a></p>
  </div>
</div>
